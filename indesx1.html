<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center">

<h2>Referencial</h2>

<div id="ref">Cargando...</div>
<div id="compra"></div>
<div id="venta"></div>

<script>
async function cargar(){
  try{
    let res = await fetch("/referencial");  // 🔥 cambio aquí
    let data = await res.json();

    document.getElementById("ref").innerText = "Ref: " + data.referencial;
    document.getElementById("compra").innerText = "Compra: " + data.compra;
    document.getElementById("venta").innerText = "Venta: " + data.venta;

  }catch(e){
    console.log("Error:", e);
  }
}

setInterval(cargar, 5000);
cargar();
</script>

</body>
</html>
