}

</style>

<body>

<h2>💰 Dólar en Vivo PRO</h2>


<!-- BLUE -->
<div class="card">

</div>

<!-- OFICIAL -->
<div class="card">
  <h3>Oficial Arg.</h3>
  <div class="compra">Compra: <span id="oficial_c"></span></div>
  <div class="venta">
    Venta: <span id="oficial_v"></span>
    <span id="oficial_estado"></span>
  </div>
</div>

<!-- CRIPTO -->
<div class="card">
  <h3>Cripto Arg. </h3>
  <div class="compra">Compra: <span id="cripto_c"></span></div>
  <div class="venta">
    Venta: <span id="cripto_v"></span>
    <span id="cripto_estado"></span>
  </div>
</div>

<!-- BOLIVIA -->
<div class="card">
  <h3>Bolivia (P2P)</h3>
  <div class="compra">Compra: <span id="bob_c"></span></div>
  <div class="venta">
    Venta: <span id="bob_v"></span>
    <span id="bob_estado"></span>
  </div>
</div>
  
<div class="card">
  <h3>💱 Peso Argentino → Boliviano</h3>
  <div class="compra">Compra: <span id="arsbob_c"></span></div>
  <div class="venta">Venta: <span id="arsbob_v"></span></div>
</div>
<a href="https://dolar-grafico-1.onrender.com">

📈 Ver gráficos

</a>
  
<p id="hora"></p>
<div class="card1">
  👁
  <img src="https://hits.sh/dolar-app-1.onrender.com.svg?style=flat-square&label=vts" />
</div>

<a href="https://wa.me/59167965805?text=Hola%20quiero%20hacer%20una%20transferencia"
   target="_blank"
   style="
     position: fixed;
     bottom: 10px;
     right: 10px;
     background: #25D366;
     color: white;
     padding: 15x 17px;
     border-radius: 50px;
     text-decoration: none;
     font-family: Arial;
     box-shadow: 0 4px 10px rgba(0,0,0,0.3);
   ">
   💬 Conssultas.
</a>


<script>


// 🔥 valores anteriores
let prev = {
  blue: null,
  oficial: null,
  cripto: null,
  bob: null
};

// 🔥 función estado
function estado(actual, anterior, id) {
  let el = document.getElementById(id);

  if (anterior === null) {
    el.textContent = " ⏳";
    el.className = "equal";
    return;
  }

  let diff = actual - anterior;
  let pct = (diff / anterior) * 100;

  if (diff > 0) {
    el.textContent = ` 📈 +${pct.toFixed(2)}%`;
    el.className = "up";
  } else if (diff < 0) {
    el.textContent = ` 📉 ${pct.toFixed(2)}%`;
    el.className = "down";
  } else {
    el.textContent = " ➖ 0%";
    el.className = "equal";
  }
}

// 🔄 cargar datos
async function cargar() {
  try {
    const res = await fetch("https://dolar-app-1.onrender.com/dolar");
    const d = await res.json();

    // BLUE
    let blue = d.azul.valor_venta;
    document.getElementById("blue_c").textContent = "$" + d.azul.valor_compra;
    document.getElementById("blue_v").textContent = "$" + blue;
    estado(blue, prev.blue, "blue_estado");
    prev.blue = blue;

    // OFICIAL
    let oficial = d.oficial.valor_venta;
    document.getElementById("oficial_c").textContent = "$" + d.oficial.valor_compra;
    document.getElementById("oficial_v").textContent = "$" + oficial;
    estado(oficial, prev.oficial, "oficial_estado");
    prev.oficial = oficial;

// CRIPTO
if (d.cripto_ars) {
  let compra = d.cripto_ars.compra;
  let venta = d.cripto_ars.venta;

  document.getElementById("cripto_c").textContent = "$" + compra.toFixed(2);
  document.getElementById("cripto_v").textContent = "$" + venta.toFixed(2);

  estado(venta, prev.cripto, "cripto_estado");
  prev.cripto = venta;
} else {
  document.getElementById("cripto_c").textContent = "--";
  document.getElementById("cripto_v").textContent = "--";
}

    // BOLIVIA
    if (d.p2p_bob) {
      let venta = d.p2p_bob.venta;
      document.getElementById("bob_c").textContent = "Bs " + d.p2p_bob.compra.toFixed(2);
      document.getElementById("bob_v").textContent = "Bs " + venta.toFixed(2);
      estado(venta, prev.bob, "bob_estado");
      prev.bob = venta;
    } else {
      document.getElementById("bob_c").textContent = "--";
      document.getElementById("bob_v").textContent = "--";
    }



// 🏦 BCB REFERENCIAL (SEGURO)
try {

  if (d.p2p_bob && d.p2p_bob.compra && d.p2p_bob.venta) {

    let compra = d.p2p_bob.compra;
    let venta  = d.p2p_bob.venta;

    compra = Math.floor(compra * 10) / 10;
    venta  = Math.ceil(venta * 10) / 10;

    document.getElementById("bcb_c").textContent =
      "Bs " + compra.toFixed(1);

    document.getElementById("bcb_v").textContent =
      "Bs " + venta.toFixed(1);

  } else {
    document.getElementById("bcb_c").textContent = "--";
    document.getElementById("bcb_v").textContent = "--";
  }

} catch (e) {
  console.log("Error BCB:", e);
}
    
// 💱 ARS → BOB
if (d.p2p_bob && d.cripto_ars) {

  let compra = d.p2p_bob.compra / d.cripto_ars.venta;
  let venta  = d.p2p_bob.venta / d.cripto_ars.compra;

  document.getElementById("arsbob_c").textContent =
    "Bs " + compra.toFixed(5);

  document.getElementById("arsbob_v").textContent =

    "Bs " + venta.toFixed(5);
} else {
  document.getElementById("arsbob_c").textContent = "--";
  document.getElementById("arsbob_v").textContent = "--";
}

    // hora
    document.getElementById("hora").textContent =
      "Actualizado: " + new Date().toLocaleTimeString();


  } catch (e) {
    console.log(e);
    document.getElementById("hora").textContent = "Error conexión";
  }
}

// 🔥 iniciar
cargar();
setInterval(cargar, 5000);

</script>

<script data-goatcounter="https://oscarq.goatcounter.com/count"async src="//gc.zgo.at/count.js"></script>
</body>


</html>
