<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gráfico Cripto ARS</title>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
  text-align:center;
}

.card {
  background:#1e293b;
  margin:20px;
  padding:15px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="card">
  <h2>📊 Cripto ARS (Tiempo real)</h2>
  <canvas id="grafico"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let historial = [];

const ctx = document.getElementById("grafico").getContext("2d");

let chart = new Chart(ctx, {
  type: "line",
  data: {
    labels: [],
    datasets: [
      {
        label: "Compra",
        data: [],
        borderColor: "#00ff99",
        tension: 0.3
      },
      {
        label: "Venta",
        data: [],
        borderColor: "#ff4d4d",
        tension: 0.3
      }
    ]
  }
});

// guardar datos
function guardar(compra, venta) {
  const ahora = new Date();
  const hora = ahora.getHours() + ":" + ahora.getMinutes();

  historial.push({ hora, compra, venta });

  if (historial.length > 20) historial.shift();
}

// actualizar gráfico
function actualizarGrafico() {
  chart.data.labels = historial.map(d => d.hora);
  chart.data.datasets[0].data = historial.map(d => d.compra);
  chart.data.datasets[1].data = historial.map(d => d.venta);
  chart.update();
}

// obtener datos
async function cargar() {
  try {
    const res = await fetch("http://127.0.0.1:3000/dolar");
    const d = await res.json();

    if (d.cripto_ars) {
      guardar(d.cripto_ars.compra, d.cripto_ars.venta);
      actualizarGrafico();
    }

  } catch (e) {
    console.log("Error:", e);
  }
}

// iniciar
cargar();
setInterval(cargar, 5000);
</script>

</body>
</html>
